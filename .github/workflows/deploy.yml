name: Deploy Next.js to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Only one deploy can run at a time. New push cancels any in-progress deploy.
concurrency:
  group: deploy-cpanel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Hard cap - prevents hanging jobs consuming GitHub runners

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Build
        env:
          NEXT_PUBLIC_APP_URL: https://realestate.amanberkigroup.com
          NODE_ENV: production
          DATABASE_URL: postgresql://dummy_user:dummy_password@127.0.0.1:5432/dummy_db
          JWT_SECRET: dummy_jwt_secret_for_compilation_only
          RESEND_API_KEY: re_dummy_resend_key_for_compilation_only
          DATABASE_SSL: false
        run: npm run build

      - name: Prepare deploy package
        run: |
          rm -rf deploy-package
          mkdir -p deploy-package
          cp -a .next/standalone/. deploy-package/
          rm -rf deploy-package/node_modules
          mkdir -p deploy-package/.next
          cp -a .next/static/. deploy-package/.next/static/
          [ -d public ]  && cp -R public  deploy-package/public
          [ -d scripts ] && cp -R scripts deploy-package/scripts
          cp package.json deploy-package/package.json

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}

      - name: Create tarball
        run: tar -czf deploy.tar.gz -C deploy-package .

      # ── SINGLE SSH SESSION ─────────────────────────────────────────────────
      # Stream the tarball via stdin so upload + extract happen in ONE connection.
      # No nohup, no background processes, no second SSH connection.
      # The server receives the tar via stdin pipe, extracts, restarts Passenger.
      # ───────────────────────────────────────────────────────────────────────
      - name: Deploy to cPanel
        run: |
          APP="${{ secrets.CPANEL_APP_ROOT }}"
          cat deploy.tar.gz | ssh \
            -o ConnectTimeout=60 \
            -o ServerAliveInterval=10 \
            -o ServerAliveCountMax=30 \
            -o TCPKeepAlive=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -p "${{ secrets.CPANEL_SSH_PORT }}" \
            "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}" \
            "cd '$APP' && cat > deploy.tar.gz && tar -xzf deploy.tar.gz && rm -f deploy.tar.gz && mkdir -p tmp && touch tmp/restart.txt && echo 'Deploy complete!'"