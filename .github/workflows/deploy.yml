name: Deploy Next.js to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cpanel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Build
        env:
          NEXT_PUBLIC_APP_URL: https://realestate.amanberkigroup.com
          NODE_ENV: production
          DATABASE_URL: postgresql://dummy_user:dummy_password@127.0.0.1:5432/dummy_db
          JWT_SECRET: dummy_jwt_secret_for_compilation_only
          RESEND_API_KEY: re_dummy_resend_key_for_compilation_only
          DATABASE_SSL: false
        run: npm run build

      - name: Prepare cPanel deploy package
        run: |
          rm -rf deploy-package
          mkdir -p deploy-package
          cp -a .next/standalone/. deploy-package/
          rm -rf deploy-package/node_modules
          mkdir -p deploy-package/.next
          cp -a .next/static/. deploy-package/.next/static/ || cp -R .next/static deploy-package/.next/static
          if [ -d public ]; then cp -R public deploy-package/public; fi
          if [ -d scripts ]; then cp -R scripts deploy-package/scripts; fi
          cp package.json deploy-package/package.json

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          cat >> ~/.ssh/config << 'EOF'
          Host *
            ServerAliveInterval 15
            ServerAliveCountMax 20
            ConnectTimeout 60
            TCPKeepAlive yes
          EOF
          ssh-keyscan -p "${{ secrets.CPANEL_SSH_PORT }}" -H "${{ secrets.CPANEL_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Create Tarball Archive
        run: tar -czf deploy.tar.gz -C deploy-package .

      - name: Write remote deploy script
        run: |
          cat > deploy-remote.sh << 'SCRIPT'
          #!/bin/bash
          APP_ROOT="$1"
          LOG="$APP_ROOT/deploy.log"
          (
            echo "[$(date)] === Deploy started ==="
            cd "$APP_ROOT" || exit 1

            # Kill stale node processes in this dir
            for pid in $(pgrep -u "$(whoami)" -f node 2>/dev/null); do
              cwd=$(readlink -f /proc/$pid/cwd 2>/dev/null || true)
              [ "$cwd" = "$APP_ROOT" ] && kill -9 "$pid" 2>/dev/null && echo "[$(date)] Killed PID $pid"
            done

            echo "[$(date)] Extracting..."
            tar -xzf deploy.tar.gz
            rm -f deploy.tar.gz deploy-remote.sh

            mkdir -p tmp
            touch tmp/restart.txt
            echo "[$(date)] Passenger restarted. Deploy complete!"
          ) >> "$LOG" 2>&1
          SCRIPT
          chmod +x deploy-remote.sh

      - name: Upload Tarball and Deploy Script to cPanel
        run: |
          scp -P "${{ secrets.CPANEL_SSH_PORT }}" \
            -o ConnectTimeout=60 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=20 \
            -o StrictHostKeyChecking=no \
            deploy.tar.gz \
            deploy-remote.sh \
            "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}:${{ secrets.CPANEL_APP_ROOT }}/"

      - name: Trigger Deploy (background, no wait)
        # Run the deploy script completely detached so SSH returns immediately.
        # The script logs to deploy.log on the server for debugging.
        run: |
          ssh \
            -o ConnectTimeout=60 \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=20 \
            -o StrictHostKeyChecking=no \
            -p "${{ secrets.CPANEL_SSH_PORT }}" \
            "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}" \
            "nohup bash ${{ secrets.CPANEL_APP_ROOT }}/deploy-remote.sh '${{ secrets.CPANEL_APP_ROOT }}' >/dev/null 2>&1 </dev/null & disown %1; sleep 2; echo 'Deploy triggered'"