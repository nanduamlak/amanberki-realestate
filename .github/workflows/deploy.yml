name: Deploy Next.js to cPanel

on:
  push:
    branches:
      - main  # Triggers deployment when pushing to the main branch
  workflow_dispatch:

concurrency:
  group: deploy-cpanel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Build
        env:
          NEXT_PUBLIC_APP_URL: https://realestate.amanberkigroup.com
          NODE_ENV: production
          # Injecting dummy environment variables to satisfy compile-time imports
          DATABASE_URL: postgresql://dummy_user:dummy_password@127.0.0.1:5432/dummy_db
          JWT_SECRET: dummy_jwt_secret_for_compilation_only
          RESEND_API_KEY: re_dummy_resend_key_for_compilation_only
          DATABASE_SSL: false
        run: npm run build

      - name: Prepare cPanel deploy package
        run: |
          rm -rf deploy-package
          mkdir -p deploy-package
          
          # 1. Copy standalone server files (includes server.js)
          cp -a .next/standalone/. deploy-package/
          
          # 2. Delete the node_modules folder from the bundle
          # CloudLinux Node.js Selector requires node_modules to be a symlink on cPanel.
          # Deleting it here prevents overwriting the cPanel symlink during upload.
          rm -rf deploy-package/node_modules
          
          # 3. Copy static files
          mkdir -p deploy-package/.next
          cp -a .next/static/. deploy-package/.next/static/ || cp -R .next/static deploy-package/.next/static
          
          # 4. Copy public assets if they exist
          if [ -d public ]; then cp -R public deploy-package/public; fi
          
          # 5. Copy database migrations scripts
          if [ -d scripts ]; then cp -R scripts deploy-package/scripts; fi
          
          # 6. Copy package.json for script runner reference
          cp package.json deploy-package/package.json

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          # Add SSH keepalive settings to prevent timeout during long operations
          cat >> ~/.ssh/config << 'EOF'
          Host *
            ServerAliveInterval 30
            ServerAliveCountMax 10
            ConnectTimeout 60
          EOF
          ssh-keyscan -p "${{ secrets.CPANEL_SSH_PORT }}" -H "${{ secrets.CPANEL_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Create Tarball Archive
        run: |
          tar -czf deploy.tar.gz -C deploy-package .

      - name: Write remote deploy script
        run: |
          # Write the deploy script to a file (avoids all shell escaping issues)
          cat > deploy-remote.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          APP_ROOT="$1"

          cd "$APP_ROOT"

          # Kill any old node processes in this directory
          for pid in $(pgrep -u "$(whoami)" -f node 2>/dev/null); do
            cwd=$(readlink -f /proc/$pid/cwd 2>/dev/null || true)
            if [ "$cwd" = "$APP_ROOT" ]; then
              echo "Terminating old node process: $pid"
              kill -9 "$pid" 2>/dev/null || true
            fi
          done

          # Extract new build
          echo "Extracting deploy.tar.gz..."
          tar -xzf deploy.tar.gz
          rm -f deploy.tar.gz

          # Touch restart.txt to trigger Passenger hot reload
          mkdir -p tmp
          touch tmp/restart.txt

          echo "Deploy complete!"
          SCRIPT
          chmod +x deploy-remote.sh

      - name: Upload Tarball and Deploy Script to cPanel
        run: |
          scp -P "${{ secrets.CPANEL_SSH_PORT }}" \
            deploy.tar.gz \
            deploy-remote.sh \
            "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}:${{ secrets.CPANEL_APP_ROOT }}/"

      - name: Extract and Deploy on cPanel Server
        run: |
          ssh \
            -o ConnectTimeout=60 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=10 \
            -p "${{ secrets.CPANEL_SSH_PORT }}" \
            "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}" \
            "bash ${{ secrets.CPANEL_APP_ROOT }}/deploy-remote.sh ${{ secrets.CPANEL_APP_ROOT }}"

      - name: Cleanup remote deploy script
        if: always()
        run: |
          ssh \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=15 \
            -p "${{ secrets.CPANEL_SSH_PORT }}" \
            "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}" \
            "rm -f ${{ secrets.CPANEL_APP_ROOT }}/deploy-remote.sh" || true