name: Deploy Next.js to cPanel

on:
  push:
    branches:
      - main  # Triggers deployment when pushing to the main branch
  workflow_dispatch:

concurrency:
  group: deploy-cpanel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Build
        env:
          NEXT_PUBLIC_APP_URL: https://realestate.amanberkigroup.com
          NODE_ENV: production
          # Injecting dummy environment variables to satisfy compile-time imports
          DATABASE_URL: postgresql://dummy_user:dummy_password@127.0.0.1:5432/dummy_db
          JWT_SECRET: dummy_jwt_secret_for_compilation_only
          RESEND_API_KEY: re_dummy_resend_key_for_compilation_only
          DATABASE_SSL: false
        run: npm run build

      - name: Prepare cPanel deploy package
        run: |
          rm -rf deploy-package
          mkdir -p deploy-package
          
          # 1. Copy standalone server files (includes server.js)
          cp -a .next/standalone/. deploy-package/
          
          # 2. Delete the node_modules folder from the bundle
          # CloudLinux Node.js Selector requires node_modules to be a symlink on cPanel.
          # Deleting it here prevents overwriting the cPanel symlink during upload.
          rm -rf deploy-package/node_modules
          
          # 3. Copy static files
          mkdir -p deploy-package/.next
          cp -a .next/static/. deploy-package/.next/static/ || cp -R .next/static deploy-package/.next/static
          
          # 4. Copy public assets if they exist
          if [ -d public ]; then cp -R public deploy-package/public; fi
          
          # 5. Copy database migrations scripts
          if [ -d scripts ]; then cp -R scripts deploy-package/scripts; fi
          
          # 6. Copy package.json for script runner reference
          cp package.json deploy-package/package.json

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.CPANEL_SSH_PORT }}" -H "${{ secrets.CPANEL_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Create Tarball Archive
        run: |
          # Compress the deploy folder into a single tarball
          tar -czf deploy.tar.gz -C deploy-package .

      - name: Upload Tarball to cPanel (High-Speed SCP)
        run: |
          # SCP copies the single file in 1-2 seconds
          scp -P "${{ secrets.CPANEL_SSH_PORT }}" deploy.tar.gz "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}:${{ secrets.CPANEL_APP_ROOT }}/"

      - name: Extract Tarball on cPanel Server (Zero-Downtime Extract)
        run: |
          # Extract and clean up the archive on the server
          ssh -p "${{ secrets.CPANEL_SSH_PORT }}" "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}" \
            "cd '${{ secrets.CPANEL_APP_ROOT }}' && tar -xzf deploy.tar.gz && rm deploy.tar.gz"

      - name: Restart Passenger app (Zero-Downtime Hot Restart)
        run: |
          ssh -p "${{ secrets.CPANEL_SSH_PORT }}" "${{ secrets.CPANEL_SSH_USER }}@${{ secrets.CPANEL_SSH_HOST }}" \
            "mkdir -p '${{ secrets.CPANEL_APP_ROOT }}/tmp' && touch '${{ secrets.CPANEL_APP_ROOT }}/tmp/restart.txt'"
